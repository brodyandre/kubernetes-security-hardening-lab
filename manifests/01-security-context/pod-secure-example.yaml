apiVersion: v1
kind: Pod
metadata:
  name: pod-secure-example
  namespace: k8s-security-lab
  labels:
    app: pod-secure-example
spec:
  # Exemplo minimo de Pod com configuracoes alinhadas ao PSA restricted.
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 30001
    fsGroup: 30001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "echo secure-example && sleep 3600"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
  volumes:
    # /tmp regravavel para o processo sem abrir escrita no root filesystem.
    - name: tmp-volume
      emptyDir: {}
