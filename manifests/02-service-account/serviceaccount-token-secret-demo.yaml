apiVersion: v1
kind: Secret
metadata:
  name: pod-reader-sa-token-demo
  namespace: k8s-security-lab
  annotations:
    # Vincula este Secret didatico a ServiceAccount existente.
    kubernetes.io/service-account.name: pod-reader-sa
type: kubernetes.io/service-account-token
# Exemplo didatico: nao inserir token manualmente.
# O controller do Kubernetes pode preencher o campo data.token automaticamente.
#
# Em Kubernetes moderno, prefira tokens temporarios:
# kubectl create token pod-reader-sa -n k8s-security-lab
