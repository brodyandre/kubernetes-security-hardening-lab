apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader-rolebinding
  namespace: k8s-security-lab
subjects:
  - kind: ServiceAccount
    name: pod-reader-sa
    namespace: k8s-security-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-reader-role
  # RoleBinding aplica permissoes dentro do namespace do proprio binding.
