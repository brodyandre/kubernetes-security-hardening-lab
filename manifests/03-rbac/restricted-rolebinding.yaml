apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-restricted-sa
  namespace: k8s-security-lab
# ServiceAccount dedicada para uso com role restrita.
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-restricted-rolebinding
  namespace: k8s-security-lab
subjects:
  - kind: ServiceAccount
    name: app-restricted-sa
    namespace: k8s-security-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-restricted-role
