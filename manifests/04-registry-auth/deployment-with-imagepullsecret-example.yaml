apiVersion: apps/v1
kind: Deployment
metadata:
  name: private-registry-example
  namespace: k8s-security-lab
  labels:
    app: private-registry-example
spec:
  # Exemplo de registry privado; mantido em 0 para evitar pull acidental com credencial placeholder.
  replicas: 0
  selector:
    matchLabels:
      app: private-registry-example
  template:
    metadata:
      labels:
        app: private-registry-example
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 30001
        seccompProfile:
          type: RuntimeDefault
      # Exemplo de uso de Secret para pull de imagem privada.
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: app
          # Placeholder didatico de imagem privada.
          image: SEU_REGISTRY/seu-time/sua-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
