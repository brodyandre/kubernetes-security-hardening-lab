apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: k8s-security-lab
type: kubernetes.io/dockerconfigjson
stringData:
  # Exemplo didatico sem credenciais reais.
  # Em ambiente real, crie este Secret via comando:
  # kubectl create secret docker-registry registry-credentials --docker-server=SEU_REGISTRY --docker-username=SEU_USUARIO --docker-password=SUA_SENHA --docker-email=SEU_EMAIL -n k8s-security-lab
  .dockerconfigjson: |
    {
      "auths": {
        "SEU_REGISTRY": {
          "username": "SEU_USUARIO",
          "password": "SUA_SENHA",
          "email": "SEU_EMAIL",
          "auth": "BASE64_USUARIO_COLON_SENHA"
        }
      }
    }
