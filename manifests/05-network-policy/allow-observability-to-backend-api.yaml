apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observability-to-backend-api
  namespace: security-backend
spec:
  podSelector:
    matchLabels:
      app: backend-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: security-observability
      ports:
        - protocol: TCP
          port: 8080
      # Diferenca didatica:
      # - aqui permitimos por namespace (todos os pods do namespace alvo),
      #   sem filtrar por label de pod.
