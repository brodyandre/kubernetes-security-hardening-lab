apiVersion: v1
kind: Pod
metadata:
  name: compliant-restricted
  namespace: restricted-lab
spec:
  # Exemplo positivo: configuracoes alinhadas ao perfil restricted.
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sh", "-c", "echo compliant && sleep 3600"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop: ["ALL"]
      volumeMounts:
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: tmp
      emptyDir: {}
